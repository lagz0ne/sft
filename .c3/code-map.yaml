# C3 code-map: maps component, ref, and rule IDs to source file glob patterns.
# Edit patterns, then verify with: c3x coverage

# Components
c3-101:
  - internal/model/**
c3-102:
  - internal/store/**
c3-103:
  - internal/format/**
c3-104:
  - internal/diagram/**
c3-110:
  - internal/loader/**
c3-111:
  - internal/show/**
c3-112:
  - internal/query/**
c3-113:
  - internal/validator/**
c3-114:
  - internal/diff/**
c3-115:
  - internal/render/**
c3-116:
  - internal/flow/**
c3-117:
  - cmd/sft/**
c3-201:
  - internal/view/**
c3-202:
  - web/apps/web/src/**

# Refs
ref-entity-resolution: []
ref-event-model: []
ref-sqlite-persistence: []
ref-yaml-format: []

# Exclusions (not counted in coverage)
_exclude:
  - "**/*.jsonl"
  - "**/*.md"
  - "**/*.mod"
  - "**/*.sh"
  - "**/*.sum"
  - "**/*.yaml"
  - "**/*.yml"
  - "**/.gitignore"
  - "**/.gitkeep"
  - .claude-plugin/**
  - examples/**
  - npm/**
  - scripts/**
  - skills/**
  - testdata/**
  - docs/**
  - web/.oxfmtrc.json
  - web/.oxlintrc.json
  - web/bts.jsonc
  - web/bun.lock
  - web/**/package.json
  - web/**/tsconfig.json
  - web/**/components.json
  - web/**/postcss.config.mjs
  - web/**/robots.txt
  - web/apps/web/src/routeTree.gen.ts
  - web/packages/**
