app:
  name: stripe
  description: Payment platform dashboard — payments, customers, subscriptions, disputes, and developer tools

  enums:
    payment_status: [succeeded, failed, processing, refunded, disputed]
    currency: [usd, eur, gbp, jpy, cad, aud]
    payment_method: [card, bank_transfer, wallet, link]
    subscription_status: [active, canceled, past_due, trialing, unpaid]
    invoice_status: [paid, open, void, draft, uncollectible]
    dispute_status: [needs_response, under_review, won, lost]
    dispute_reason: [fraudulent, not_received, product_not_as_described, duplicate, subscription_canceled, unrecognized]
    refund_status: [pending, succeeded, failed]
    refund_reason: [duplicate, fraudulent, requested_by_customer]
    webhook_status: [enabled, disabled]
    notification_type: [payment_failed, dispute_opened, compliance_action]
    cancel_timing: [immediate, end_of_period]

  data:
    payment:
      id: string
      amount: number
      currency: currency
      status: payment_status
      customer: customer?
      payment_method: payment_method
      metadata: string?
      created_at: datetime
    customer:
      id: string
      name: string
      email: string
      total_spend: number
      subscription_count: number
      created_at: datetime
    subscription:
      id: string
      plan_name: string
      status: subscription_status
      current_period_start: date
      current_period_end: date
      next_billing_date: date?
      customer: customer
    invoice:
      id: string
      amount: number
      status: invoice_status
      period_start: date
      period_end: date
      pdf_url: string?
    dispute:
      id: string
      amount: number
      reason: dispute_reason
      status: dispute_status
      evidence_deadline: datetime?
      payment: payment
    refund:
      amount: number
      reason: refund_reason?
      status: refund_status
      created_at: datetime
    webhook_endpoint:
      url: string
      events: string[]
      status: webhook_status
    api_event:
      id: string
      type: string
      created_at: datetime
      request_body: string?
      response_body: string?
    notification:
      title: string
      body: string
      type: notification_type
      created_at: datetime

  context:
    current_user: customer
    test_mode: boolean

  regions:
    - name: main_nav
      description: Primary navigation — home, payments, customers, products, billing, reports, developers
    - name: search_bar
      description: Global search across payments, customers, invoices, and subscriptions
    - name: test_mode_banner
      description: Warning banner indicating test environment is active
      tags: [test_mode]
    - name: notification_drawer
      description: Alerts for failed payments, disputes needing response, and compliance actions
      tags: [overlay]
      events:
        select_notification: (notification)
      state_machine:
        viewing:
          on:
            select_notification: navigate(payment_detail)

  screens:
    - name: home
      description: Business overview — gross volume, successful payments, new disputes, and net revenue
      context:
        gross_volume: number
        successful_payments: number
        recent_payments: payment[]
      regions:
        - name: volume_chart
          description: Revenue trend for selected period with daily/weekly/monthly toggle
          ambient:
            gross_volume: "data(home, .gross_volume)"
        - name: metrics_row
          description: Gross volume, successful payments, new customers, active subscriptions
          ambient:
            gross_volume: "data(home, .gross_volume)"
            successful_payments: "data(home, .successful_payments)"
        - name: recent_payments
          description: Latest payment activity with status and amount
          events:
            select_payment: (payment)
          ambient:
            payments: "data(home, .recent_payments)"

    - name: payment_list
      description: Searchable payment log with filtering and bulk export
      context:
        payments: payment[]
        selected: payment[]
      regions:
        - name: filter_bar
          description: Filter by status, amount range, date, payment method, and currency
          data:
            status_filter: payment_status?
            amount_min: number
            amount_max: number
            date_range: string
        - name: payment_table
          description: Payment rows with amount, status badge, customer, date, and method
          tags: [has_payments]
          events:
            select_payment: (payment)
            check_payment: (payment)
            escape:
          ambient:
            payments: "data(payment_list, .payments)"
        - name: payment_empty_state
          description: Illustration and prompt to create first payment or adjust filters
          tags: [no_payments]
        - name: loading_skeleton
          description: Animated placeholder rows while payment data loads
          tags: [loading]
        - name: error_banner
          description: Error message with retry action when payment data fails to load
          tags: [error]
          events: [retry_load]
        - name: bulk_action_bar
          description: Export selected, refund selected — appears in selecting state
          events: [bulk_export]
          ambient:
            selected: "data(payment_list, .selected)"
      state_machine:
        browsing:
          regions: [filter_bar, payment_table, payment_empty_state, loading_skeleton, error_banner]
          on:
            select_payment: navigate(payment_detail)
            check_payment: selecting
            retry_load: .
        selecting:
          regions: [filter_bar, payment_table, bulk_action_bar]
          on:
            check_payment: .
            bulk_export: browsing
            escape: browsing

    - name: payment_detail
      description: Single payment — amount, timeline, customer, metadata, and available actions
      tags: [per_payment]
      context:
        payment: payment
        refunds: refund[]
      regions:
        - name: payment_header
          description: Amount, status badge, payment ID, and creation timestamp
          ambient:
            payment: "data(payment_detail, .payment)"
        - name: payment_timeline
          description: Chronological events — created, processing, succeeded/failed, refunded, disputed
          ambient:
            payment: "data(payment_detail, .payment)"
        - name: customer_card
          description: Linked customer name, email, and payment history summary
          ambient:
            payment: "data(payment_detail, .payment)"
        - name: payment_metadata
          description: Key-value metadata attached by the integration
          ambient:
            payment: "data(payment_detail, .payment)"
        - name: refund_area
          description: Refund action group — button and confirmation dialog
          tags: [succeeded]
          regions:
            - name: refund_button
              description: Issue full or partial refund
              tags: [primary]
              events: [start_refund]
            - name: refund_confirmation
              description: Confirm refund amount and reason before processing
              tags: [overlay]
              events:
                confirm_refund: (refund)
                cancel_refund:
              data:
                refund_amount: number
                refund_reason: refund_reason?
          state_machine:
            idle:
              regions: [refund_button]
              on:
                start_refund: confirming
            confirming:
              regions: [refund_button, refund_confirmation]
              on:
                confirm_refund: idle
                cancel_refund: idle
        - name: dispute_alert
          description: Warning banner showing dispute reason and evidence submission deadline
          tags: [disputed]
        - name: refund_summary
          description: Refund details — amount returned, date, and reason
          tags: [refunded]

    - name: customer_list
      description: Customer directory with search and segment filtering
      context:
        customers: customer[]
      regions:
        - name: customer_table
          description: Customer rows with name, email, total spend, and subscription count
          tags: [has_customers]
          events:
            select_customer: (customer)
          ambient:
            customers: "data(customer_list, .customers)"
        - name: customer_empty_state
          description: Prompt to create first customer or import from CSV
          tags: [no_customers]
      state_machine:
        browsing:
          regions: [customer_table, customer_empty_state]
          on:
            select_customer: navigate(customer_detail)

    - name: customer_detail
      description: Customer profile — payment history, subscriptions, and account management
      tags: [per_customer]
      context:
        customer: customer
        payments: payment[]
        subscriptions: subscription[]
      regions:
        - name: customer_header
          description: Name, email, created date, and lifetime value
          ambient:
            customer: "data(customer_detail, .customer)"
        - name: payment_history
          description: All payments from this customer with status and amount
          events:
            select_payment: (payment)
          ambient:
            payments: "data(customer_detail, .payments)"
        - name: active_subscriptions
          description: Current subscriptions with plan, status, and next billing date
          events:
            select_subscription: (subscription)
          ambient:
            subscriptions: "data(customer_detail, .subscriptions)"
        - name: delete_button
          description: Permanently remove customer and all associated data
          tags: [destructive]
          events: [start_delete]
        - name: delete_confirmation
          description: Type customer name to confirm deletion — warns this cannot be undone
          tags: [overlay]
          events: [confirm_delete, cancel_delete]
          data:
            confirmation_name: string
      state_machine:
        viewing:
          regions: [customer_header, payment_history, active_subscriptions, delete_button]
          on:
            select_payment: navigate(payment_detail)
            select_subscription: navigate(subscription_detail)
            start_delete: deleting
        deleting:
          regions: [customer_header, payment_history, active_subscriptions, delete_button, delete_confirmation]
          on:
            confirm_delete: viewing
            cancel_delete: viewing

    - name: subscription_detail
      description: Subscription management — plan, billing cycle, invoices, and cancellation
      tags: [per_subscription]
      context:
        subscription: subscription
        invoices: invoice[]
      regions:
        - name: subscription_header
          description: Plan name, status badge, current period, and next billing date
          ambient:
            subscription: "data(subscription_detail, .subscription)"
        - name: invoice_history
          description: Past invoices with amount, status, and PDF download
          ambient:
            invoices: "data(subscription_detail, .invoices)"
        - name: upcoming_invoice
          description: Preview of next invoice with prorated line items
          tags: [active]
        - name: cancel_button
          description: Cancel subscription immediately or at period end
          tags: [active, destructive]
          events: [start_cancel]
        - name: cancel_confirmation
          description: Choose immediate or end-of-period — shows revenue impact warning
          tags: [overlay]
          events:
            confirm_cancel: (cancel_timing)
            abort_cancel:
          data:
            cancel_timing: cancel_timing
      state_machine:
        viewing:
          regions: [subscription_header, invoice_history, upcoming_invoice, cancel_button]
          on:
            start_cancel: cancelling
        cancelling:
          regions: [subscription_header, invoice_history, upcoming_invoice, cancel_button, cancel_confirmation]
          on:
            confirm_cancel: viewing
            abort_cancel: viewing

    - name: dispute_detail
      description: Dispute evidence submission and resolution tracking
      tags: [per_dispute]
      context:
        dispute: dispute
      regions:
        - name: dispute_header
          description: Dispute amount, reason category, and evidence deadline countdown
          ambient:
            dispute: "data(dispute_detail, .dispute)"
        - name: dispute_timeline
          description: Status progression — opened, evidence due, under review, won or lost
          ambient:
            dispute: "data(dispute_detail, .dispute)"
        - name: evidence_uploader
          description: Upload receipts, shipping proof, and customer correspondence
          tags: [needs_evidence]
          events: [upload_evidence, submit_evidence]
          data:
            uploaded_files: string[]
          state_machine:
            collecting:
              on:
                upload_evidence: .
                submit_evidence: { to: submitted, action: "emit(evidence_complete, target: [dispute_detail])" }
            submitted:
              fixture: evidence_submitted
        - name: resolution_summary
          description: Outcome — funds returned (won) or permanently deducted (lost)
          tags: [resolved]
      state_machine:
        responding:
          regions: [dispute_header, dispute_timeline, evidence_uploader]
          on:
            evidence_complete: awaiting_resolution
        awaiting_resolution:
          regions: [dispute_header, dispute_timeline, resolution_summary]

    - name: developers
      description: API keys, webhooks, event logs, and testing tools
      context:
        webhooks: webhook_endpoint[]
        events: api_event[]
      regions:
        - name: api_keys
          description: Publishable and secret keys for test and live modes
        - name: webhook_endpoints
          description: Configured URLs with event subscriptions and delivery status
          events:
            select_webhook: (webhook_endpoint)
          ambient:
            webhooks: "data(developers, .webhooks)"
        - name: recent_events
          description: Latest API events with request/response inspection
          tags: [has_events]
          events:
            select_event: (api_event)
          ambient:
            events: "data(developers, .events)"
        - name: events_empty
          description: No events yet — shows quickstart integration guide
          tags: [no_events]
      state_machine:
        browsing:
          regions: [api_keys, webhook_endpoints, recent_events, events_empty]
          on:
            select_webhook: .
            select_event: .

  fixtures:
    evidence_submitted:
      dispute_detail.evidence_uploader:
        uploaded_files: ["receipt.pdf", "tracking.png"]

  flows:
    - name: refund_payment
      description: Issue a refund with amount and reason confirmation
      on: start_refund
      sequence: "payment_detail{payment ID} → refund_confirmation{refund amount + reason} → confirm_refund → payment_detail{updated status}"

    - name: refund_failed
      description: Refund processing fails — user sees error and retries or abandons
      sequence: "payment_detail → refund_confirmation → confirm_refund → error → retry or cancel_refund"

    - name: cancel_subscription
      description: Cancel a subscription with timing choice and revenue impact warning
      on: start_cancel
      sequence: "subscription_detail{subscription ID} → cancel_confirmation{cancellation timing} → confirm_cancel → subscription_detail{updated status}"

    - name: dispute_response
      description: Collect and submit evidence for a payment dispute before the deadline
      sequence: "dispute_detail{dispute ID + deadline} → upload_evidence{evidence files} → submit_evidence → await resolution{submission confirmation}"

    - name: payment_from_list
      description: Inspect a payment and return to the list with position preserved
      sequence: "payment_list → payment_detail → [Back] → payment_list(H)"

    - name: payment_from_notification
      description: Navigate from a failed payment notification to investigate and resolve
      on: select_notification
      sequence: "notification_drawer activates → payment_detail → refund or retry"
