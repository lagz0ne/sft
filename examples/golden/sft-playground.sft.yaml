app: sft-playground

layouts:
  top-bar:          [col-span-full, row-start-1]
  sticky-top-bar:   [sticky, top-0, col-span-full, z-20]
  sidebar:          [col-span-2, row-start-2, row-span-full]
  sidebar-far:      [col-start-11, col-span-2, row-start-2, row-span-full]
  content-fill:     [1fr]
  bottom-bar:       [col-span-full]
  bottom-nav-fixed: [fixed, bottom-0, left-0, right-0, z-20]
  modal:            [fixed, inset-0, z-50]
  drawer-right:     [fixed, top-0, right-0, bottom-0, w-1/3, z-40]
  drawer-left:      [fixed, top-0, left-0, bottom-0, w-1/3, z-40]
  fab-bottom-right: [fixed, bottom-0, right-0, z-30]
  fab-bottom-left:  [fixed, bottom-0, left-0, z-30]

screens:
  viewer:
    regions:
      nav_tabs:
        description: "Primary navigation tabs for switching between Dashboard, Settings, and Profile"
        component: Tabs
        props:
          items: [Dashboard, Settings, Profile]
          variant: underline
        events: [switch_tab]
        discovery:
          layout: [sticky-top-bar]
        delivery:
          classes: [sticky, top-0, z-20, w-full, bg-white, border-b, border-gray-200, px-4, flex, items-center, gap-6, h-12, shadow-sm]

      breadcrumbs:
        description: "Contextual path breadcrumbs showing current navigation depth"
        component: ButtonGroup
        props:
          items: [App, inbox, email_list]
          variant: ghost
          separator: "/"
        events: [navigate_breadcrumb]
        discovery:
          layout: [top-bar]
        delivery:
          classes: [col-span-full, row-start-2, bg-gray-50, border-b, border-gray-100, px-6, py-2, flex, items-center, gap-1, text-sm, text-gray-500]

      nav_list:
        description: "Sidebar navigation listing spec entity categories"
        component: Heading
        props:
          text: "Explorer"
          level: 3
        events: [select_category]
        discovery:
          layout: [sidebar]
        delivery:
          classes: [col-span-2, row-start-3, row-span-full, bg-gray-50, border-r, border-gray-200, py-4, px-3, flex, flex-col, gap-1, overflow-y-auto]
        regions:
          screens_nav:
            description: "Navigate to screens listing"
            component: Button
            props: { label: "Screens", icon: "layout", variant: "ghost" }
            events: [select_screens]
            discovery:
              layout: [sidebar]
            delivery:
              classes: [w-full, text-left, px-3, py-2, rounded-md, text-sm, text-gray-700, "hover:bg-gray-100", "data-[active]:bg-blue-50", "data-[active]:text-blue-700"]
          regions_nav:
            description: "Navigate to regions listing"
            component: Button
            props: { label: "Regions", icon: "grid", variant: "ghost" }
            events: [select_regions]
            discovery:
              layout: [sidebar]
            delivery:
              classes: [w-full, text-left, px-3, py-2, rounded-md, text-sm, text-gray-700, "hover:bg-gray-100", "data-[active]:bg-blue-50", "data-[active]:text-blue-700"]
          events_nav:
            description: "Navigate to events listing"
            component: Button
            props: { label: "Events", icon: "zap", variant: "ghost" }
            events: [select_events]
            discovery:
              layout: [sidebar]
            delivery:
              classes: [w-full, text-left, px-3, py-2, rounded-md, text-sm, text-gray-700, "hover:bg-gray-100", "data-[active]:bg-blue-50", "data-[active]:text-blue-700"]
          flows_nav:
            description: "Navigate to flows listing"
            component: Button
            props: { label: "Flows", icon: "git-branch", variant: "ghost" }
            events: [select_flows]
            discovery:
              layout: [sidebar]
            delivery:
              classes: [w-full, text-left, px-3, py-2, rounded-md, text-sm, text-gray-700, "hover:bg-gray-100", "data-[active]:bg-blue-50", "data-[active]:text-blue-700"]

      data_grid:
        description: "Main content area showing tabular data for the selected entity category"
        component: Table
        props:
          columns: [name, regions, events, status]
          striped: true
          hoverable: true
        events: [select_row, sort_column]
        discovery:
          layout: [content-fill]
        delivery:
          classes: [flex-1, overflow-auto, px-6, py-4, bg-white, min-h-0]

      detail_panel:
        description: "Right sidebar showing detailed information for the selected entity"
        component: Heading
        props:
          text: "Details"
          level: 3
        events: [edit_entity, delete_entity]
        discovery:
          layout: [sidebar-far]
        delivery:
          classes: [col-start-11, col-span-2, row-start-3, row-span-full, bg-white, border-l, border-gray-200, py-4, px-4, flex, flex-col, gap-4, overflow-y-auto]
        regions:
          detail_title:
            description: "Entity name displayed as section header"
            component: Heading
            props: { level: 4, text: "inbox" }
            discovery:
              layout: [sidebar-far]
            delivery:
              classes: [text-lg, font-semibold, text-gray-900, pb-2, border-b, border-gray-100]
          detail_fields:
            description: "Property fields showing entity metadata"
            component: Stack
            props: { direction: "vertical", gap: 3 }
            discovery:
              layout: [sidebar-far]
            delivery:
              classes: [flex, flex-col, gap-3, text-sm, text-gray-600]
          detail_actions:
            description: "Action buttons for editing or managing the selected entity"
            component: ButtonGroup
            props:
              items: [Edit, Duplicate, Delete]
              variant: outline
              size: sm
            events: [edit_entity, duplicate_entity, delete_entity]
            discovery:
              layout: [sidebar-far]
            delivery:
              classes: [flex, gap-2, pt-4, border-t, border-gray-100, mt-auto]

      status_bar:
        description: "Bottom status bar showing spec statistics and sync state"
        component: Text
        props:
          text: "3 screens | 12 regions | 8 events | 2 flows"
          variant: muted
        discovery:
          layout: [bottom-bar]
        delivery:
          classes: [col-span-full, bg-gray-50, border-t, border-gray-200, px-6, py-1.5, text-xs, text-gray-400, flex, items-center, justify-between]

      dock:
        description: "Floating bottom dock for switching playground modes and viewport controls"
        component: Tabs
        props:
          items:
            - { label: "Mode", icon: "toggle-left" }
            - { label: "Screen", icon: "monitor" }
            - { label: "State", icon: "activity" }
            - { label: "Viewport", icon: "maximize" }
            - { label: "Component Set", icon: "layers" }
          variant: pills
        events: [toggle_mode, select_screen, change_viewport, change_component_set]
        discovery:
          layout: [bottom-nav-fixed]
        delivery:
          classes: [fixed, bottom-4, left-1/2, -translate-x-1/2, z-40, bg-white/90, backdrop-blur-xl, border, border-gray-200, rounded-2xl, px-4, py-2, flex, items-center, gap-3, shadow-lg]

    states: [screen_mode, flow_mode]
    transitions:
      - {on: toggle_mode, from: screen_mode, to: flow_mode}
      - {on: toggle_mode, from: flow_mode, to: screen_mode}
      - {on: select_screen, from: screen_mode, to: screen_mode}
      - {on: select_screen, from: flow_mode, to: screen_mode}

    flows:
      switch_mode:
        description: "Toggle between screen preview and flow walkthrough modes via the dock"
        sequence: "viewer → dock → toggle_mode → viewer(flow_mode)"
      browse_screens:
        description: "Navigate the screen list, select a screen, and inspect its details"
        sequence: "viewer → nav_list → select_screens → data_grid → select_row → detail_panel"
