app:
  name: collab_docs
  description: Collaborative document editor — real-time editing, sharing, offline sync, and workspace management

  regions:
    - name: top_bar
      description: Logo, document title (editable inline), share button, and user avatar menu
    - name: mobile_nav
      description: Hamburger menu for responsive sidebar toggle on small viewports
      tags: [responsive, mobile]
    - name: command_palette
      description: Cmd+K search and action palette — available from any screen
      tags: [overlay]
    - name: toast_stack
      description: Auto-dismissing snackbar notifications — save confirmation, share success, error alerts
      tags: [toast, overlay]
      events: [dismiss_toast, undo_action]
    - name: offline_banner
      description: Connection status indicator — shows sync state and reconnect progress
      tags: [offline]
    - name: onboarding_tour
      description: Step-by-step welcome overlay guiding new users through key features
      tags: [overlay, onboarding, first_visit]
      events: [next_step, skip_tour, finish_tour]
      state_machine:
        active:
          on:
            next_step: .
            skip_tour: dismissed
            finish_tour: dismissed
        dismissed: {}

  screens:
    - name: login
      description: Authentication screen — email/password, SSO, and MFA verification
      regions:
        - name: login_form
          description: Email and password fields with SSO provider buttons
          events: [submit_login, start_sso]
        - name: mfa_challenge
          description: TOTP or SMS code entry after primary authentication succeeds
          tags: [mfa_required]
          events: [submit_mfa, resend_code]
        - name: forgot_password
          description: Password reset flow — enter email, receive link
          tags: [overlay]
          events: [request_reset, cancel_reset]
      state_machine:
        credentials:
          on:
            submit_login: verifying
            start_sso: verifying
        mfa:
          on:
            submit_mfa: verifying
        verifying: {}

    - name: workspace
      description: Document list with folders, recent activity, and workspace settings
      regions:
        - name: sidebar
          description: Folder tree, favorites, shared-with-me, and trash — collapsible on mobile
          tags: [responsive]
        - name: document_grid
          description: Document cards with title, last-edited, collaborator avatars
          events: [select_document, context_menu_document]
        - name: context_menu
          description: Right-click menu — rename, duplicate, move, share, delete
          tags: [overlay, context_menu]
          events: [rename_doc, duplicate_doc, delete_doc, share_doc]
        - name: getting_started
          description: Welcome card for new users with template suggestions and import options
          tags: [onboarding, first_visit]
      state_machine:
        browsing:
          on:
            select_document: navigate(editor)
            context_menu_document: context_open
        context_open:
          on:
            rename_doc: browsing
            duplicate_doc: browsing
            delete_doc: browsing
            share_doc: browsing
            escape: browsing

    - name: editor
      description: Full document editor with real-time collaboration, commenting, and version history
      tags: [per_document]
      regions:
        - name: editor_toolbar
          description: Formatting, insert, undo/redo buttons, and responsive overflow menu
          events: [undo, redo, insert_block]
        - name: document_canvas
          description: Block-based content area with optimistic saves — edits apply instantly, sync in background
          tags: [optimistic_update]
          events: [edit_content, save_triggered]
        - name: collaborator_cursors
          description: Real-time cursor positions and selections of other users
          tags: [has_collaborators]
        - name: sync_indicator
          description: Shows saving / saved / offline-queued / sync-conflict status
          tags: [offline]
          events: [retry_sync, resolve_conflict]
          state_machine:
            synced:
              on:
                edit_content: saving
            saving:
              on:
                save_triggered: synced
            conflict:
              on:
                retry_sync: saving
                resolve_conflict: synced
        - name: comment_thread
          description: Inline discussion anchored to a text selection
          tags: [overlay]
          events: [add_comment, resolve_thread]
        - name: version_history
          description: Timeline of document versions with diff preview and rollback
          tags: [overlay]
          events: [select_version, rollback_version]
      state_machine:
        editing:
          on:
            undo: .
            redo: .
            rollback_version: .

  flows:
    - name: login_to_workspace
      description: Authenticate and land in the workspace — includes MFA if required
      on: submit_login
      sequence: "login → verifying → workspace"

    - name: edit_with_undo
      description: Edit a document, undo a mistake via toolbar or Cmd+Z, redo if needed
      sequence: "editor → edit_content → undo → redo"

    - name: offline_sync
      description: Edit while offline, reconnect, and resolve any sync conflicts
      sequence: "editor{queued edits} → reconnect → sync_indicator → resolve_conflict → editor{synced}"

    - name: context_menu_action
      description: Right-click a document card and perform an action
      sequence: "workspace → context_menu_document → context_menu activates → rename_doc → workspace"

    - name: onboard_to_editor
      description: New user completes tour then opens first document
      sequence: "onboarding_tour activates → finish_tour → workspace → editor"
