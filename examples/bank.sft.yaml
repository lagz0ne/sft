app:
  name: bank_app
  description: Retail banking — accounts, transactions, transfers, cards, loans, and security settings

  enums:
    account_type: [checking, savings, credit, loan]
    account_status: [active, frozen, closed]
    currency: [USD, EUR, GBP, CAD, AUD]
    transaction_category: [groceries, dining, transport, entertainment, utilities, health, shopping, other]
    transaction_status: [pending, settled, declined, disputed, refunded]
    card_type: [debit, credit, virtual]
    card_status: [active, frozen, expired, stolen]
    loan_status: [active, paid_off, defaulted]
    application_status: [draft, submitted, under_review, approved, rejected]
    transfer_status: [pending, processing, completed, failed]
    pending_type: [unsigned_loan, incomplete_transfer, expiring_card]
    employment_status: [employed, self_employed, unemployed, retired]
    repayment_frequency: [monthly, biweekly, weekly]

  data:
    account:
      name: string
      number_masked: string
      type: account_type
      balance: number
      available_balance: number
      currency: currency
      status: account_status
      interest_rate: number?
    transaction:
      merchant: string
      amount: number
      currency: currency
      date: datetime
      category: transaction_category
      status: transaction_status
      reference: string?
      card_used: card?
    transfer:
      from_account: account
      to_recipient: recipient
      amount: number
      currency: currency
      fee: number?
      reference: string?
      estimated_arrival: datetime?
      status: transfer_status
    recipient:
      name: string
      account_number: string
      routing_number: string
      bank_name: string
    card:
      number_masked: string
      type: card_type
      status: card_status
      expiry_date: date
      daily_atm_limit: number
      daily_pos_limit: number
      daily_online_limit: number
      contactless_enabled: boolean
    loan:
      amount: number
      principal_remaining: number
      interest_rate: number
      monthly_payment: number
      next_payment_date: date
      term_months: number
      status: loan_status
    loan_application:
      amount: number
      term_months: number
      rate: number
      monthly_payment: number
      status: application_status
      application_id: string?
    pending_item:
      type: pending_type
      description: string
      deadline: datetime?
      action_url: string?
    user:
      name: string
      email: string
      phone: string

  context:
    current_user: user
    session_active: boolean

  regions:
    - name: bottom_nav
      description: Home, Accounts, Transfer, Cards, More — persistent tab bar
    - name: session_timeout
      description: Inactivity warning overlay with countdown — extends or logs out
      tags: [overlay, inactive]
      events: [extend_session, logout]
      state_machine:
        waiting:
          on:
            extend_session: .
            logout: navigate(login)
    - name: biometric_prompt
      description: Face ID / fingerprint prompt for sensitive actions — transfer, card lock, loan sign
      tags: [overlay, biometric_enabled]
      events: [biometric_success, biometric_fail, fallback_pin]
      state_machine:
        prompting:
          on:
            biometric_success: .
            biometric_fail: .
            fallback_pin: .
    - name: push_notification_banner
      description: In-app alert for incoming transfers, fraud alerts, and payment reminders
      tags: [overlay, toast]
      events:
        tap_notification:
        dismiss_notification:
      state_machine:
        showing:
          on:
            tap_notification: .
            dismiss_notification: .

  screens:
    - name: login
      description: PIN or biometric entry — locked after 5 failed attempts
      context:
        attempts: number
      regions:
        - name: pin_pad
          description: 6-digit PIN entry with biometric shortcut
          events:
            submit_pin(string):
          data:
            pin_entry: string
        - name: biometric_login
          description: Face ID / fingerprint as primary auth
          tags: [biometric_enabled]
          events: [biometric_success, biometric_fail]
        - name: locked_account
          description: Account locked after max failed attempts — shows support contact
          tags: [locked]
        - name: maintenance_banner
          description: Scheduled downtime notice with estimated restoration time
          tags: [maintenance_window]
      state_machine:
        entering:
          regions: [pin_pad, biometric_login, maintenance_banner]
          on:
            submit_pin: verifying
            biometric_success: navigate(home)
            biometric_fail: .
        verifying:
          regions: [locked_account]

    - name: home
      description: Dashboard — aggregated balance, recent activity, and quick actions
      context:
        total_balance: number
        recent_transactions: transaction[]
        pending_items: pending_item[]
      regions:
        - name: balance_card
          description: Total balance across all accounts — tap to toggle visible/masked
          events: [toggle_balance]
          ambient:
            total_balance: "data(home, .total_balance)"
        - name: quick_actions
          description: Transfer, Pay Bill, Top Up, QR Pay — contextual based on account types
        - name: recent_transactions
          description: Last 5 transactions across all accounts with merchant icons
          events:
            select_transaction(transaction):
          ambient:
            transactions: "data(home, .recent_transactions)"
        - name: spending_insights
          description: Weekly spending chart by category — only for accounts with 30+ days history
          tags: [has_history]
        - name: pending_actions
          description: Items requiring attention — unsigned loans, incomplete transfers, expiring cards
          tags: [has_pending]
          events:
            select_pending(pending_item):
          ambient:
            items: "data(home, .pending_items)"
        - name: fraud_alert
          description: Urgent banner for suspicious transaction — block card or dismiss
          tags: [fraud_detected]
          events: [block_card, dismiss_alert]
      state_machine:
        idle:
          regions: [balance_card, quick_actions, recent_transactions, spending_insights, pending_actions]
          on:
            select_transaction: navigate(transaction_detail)
            select_pending: navigate(pending_detail)
            block_card: .
            toggle_balance: .
            dismiss_alert: .

    - name: account_list
      description: All accounts — checking, savings, credit, loan — each with balance and status
      context:
        accounts: account[]
      regions:
        - name: checking_accounts
          description: Checking accounts with available balance and pending holds
          tags: [has_checking]
          events:
            select_account(account):
          ambient:
            accounts: "data(account_list, .accounts)"
        - name: savings_accounts
          description: Savings accounts with interest rate and goal progress
          tags: [has_savings]
          events:
            select_account(account):
          ambient:
            accounts: "data(account_list, .accounts)"
        - name: credit_accounts
          description: Credit cards with available credit, current balance, and minimum due
          tags: [has_credit]
          events:
            select_account(account):
          ambient:
            accounts: "data(account_list, .accounts)"
        - name: loan_accounts
          description: Active loans with remaining balance, next payment, and payoff date
          tags: [has_loans]
          events:
            select_account(account):
          ambient:
            accounts: "data(account_list, .accounts)"
        - name: closed_accounts
          description: Previously closed accounts — view-only with historical statements
          tags: [has_closed]
          events:
            select_account(account):
        - name: empty_state
          description: No accounts — prompt to open first account or contact support
          tags: [no_accounts]
      state_machine:
        browsing:
          on:
            select_account: navigate(account_detail)

    - name: account_detail
      description: Single account view — balance, transactions, statements, and account-type-specific actions
      tags: [per_account]
      context:
        account: account
        transactions: transaction[]
      regions:
        - name: account_header
          description: Account name, number (masked), balance, and status badge
          ambient:
            account: "data(account_detail, .account)"
        - name: transaction_list
          description: Scrollable transaction history with search and date filter
          events:
            select_transaction(transaction):
            filter_transactions(string):
          ambient:
            transactions: "data(account_detail, .transactions)"
          data:
            search_query: string
            date_filter: string
        - name: pending_transactions
          description: Authorized but unsettled transactions — amounts may change
          tags: [has_pending]
        - name: scheduled_payments
          description: Upcoming recurring payments and transfers from this account
          tags: [has_scheduled]
          events: [select_scheduled, cancel_scheduled, escape]
        - name: statement_download
          description: Monthly PDF statements with date range picker
          events:
            download_statement(date):
          data:
            date_range: string
        - name: interest_summary
          description: Accrued interest, rate, and projected annual yield
          tags: [savings]
          ambient:
            account: "data(account_detail, .account)"
        - name: credit_summary
          description: Credit limit, utilization percentage, minimum payment, and due date
          tags: [credit]
          ambient:
            account: "data(account_detail, .account)"
        - name: loan_summary
          description: Principal remaining, interest paid, amortization schedule link
          tags: [loan]
          ambient:
            account: "data(account_detail, .account)"
        - name: overdraft_warning
          description: Alert when balance approaches or goes below zero
          tags: [low_balance]
        - name: frozen_banner
          description: Account frozen — shows reason and steps to resolve
          tags: [frozen]
      state_machine:
        viewing:
          regions: [account_header, transaction_list, pending_transactions, scheduled_payments, statement_download]
          on:
            select_transaction: navigate(transaction_detail)
            cancel_scheduled: confirming_cancel
            filter_transactions: .
            select_scheduled: .
            download_statement: .
        confirming_cancel:
          on:
            escape: viewing

    - name: transaction_detail
      description: Single transaction — amount, merchant, date, category, status, and dispute option
      tags: [per_transaction]
      context:
        transaction: transaction
      regions:
        - name: transaction_header
          description: Merchant name/logo, amount, date, and status badge
          ambient:
            transaction: "data(transaction_detail, .transaction)"
        - name: transaction_meta
          description: Category, reference number, exchange rate (if foreign), and card used
          ambient:
            transaction: "data(transaction_detail, .transaction)"
        - name: pending_notice
          description: Transaction is authorized but not yet settled — final amount may differ
          tags: [pending]
        - name: declined_notice
          description: Transaction was declined — shows reason code and suggested action
          tags: [declined]
        - name: dispute_button
          description: Open a dispute for unauthorized or incorrect charge
          tags: [settled, primary]
          events: [start_dispute]
        - name: dispute_status
          description: Active dispute — shows status, submitted evidence, and estimated resolution
          tags: [disputed]
        - name: refund_summary
          description: Refund processed — amount returned and settlement date
          tags: [refunded]
        - name: receipt_image
          description: Attached receipt photo or merchant-provided receipt
          tags: [has_receipt]
      state_machine:
        viewing:
          on:
            start_dispute: .

    - name: transfer
      description: Multi-step money transfer — recipient, amount, review, authenticate, confirm
      context:
        from_account: account
        transfer_draft: transfer
        recipients: recipient[]
      regions:
        - name: recipient_picker
          description: Search saved recipients, enter new account/routing, or scan QR code
          events:
            select_recipient(recipient):
            add_recipient:
          ambient:
            recipients: "data(transfer, .recipients)"
          data:
            search_query: string
        - name: amount_input
          description: Transfer amount with currency, source account selector, and available balance
          events:
            set_amount(number):
          ambient:
            from_account: "data(transfer, .from_account)"
          data:
            amount: number
            currency: currency
        - name: transfer_review
          description: Summary of transfer — from, to, amount, fee, estimated arrival
          tags: [overlay]
          events: [confirm_transfer, edit_transfer]
          ambient:
            draft: "data(transfer, .transfer_draft)"
        - name: auth_challenge
          description: OTP or biometric verification before executing transfer
          tags: [overlay]
          events: [auth_success, auth_fail]
          data:
            otp_code: string
        - name: transfer_success
          description: Confirmation with reference number and option to save recipient
          tags: [completed]
        - name: transfer_failed
          description: Error with reason — insufficient funds, daily limit, recipient invalid
          tags: [error]
          events: [retry_transfer]
        - name: daily_limit_warning
          description: Warning when transfer amount approaches or exceeds daily limit
          tags: [near_limit]
        - name: insufficient_funds
          description: Cannot proceed — balance too low, suggests lower amount or different account
          tags: [insufficient]
      state_machine:
        picking_recipient:
          regions: [recipient_picker]
          on:
            select_recipient: entering_amount
            add_recipient: .
        entering_amount:
          regions: [recipient_picker, amount_input]
          on:
            set_amount: reviewing
        reviewing:
          regions: [transfer_review]
          on:
            confirm_transfer: authenticating
            edit_transfer: entering_amount
        authenticating:
          regions: [transfer_review, auth_challenge]
          on:
            auth_success: completed
            auth_fail: failed
        failed:
          regions: [transfer_failed]
          on:
            retry_transfer: reviewing
        completed:
          regions: [transfer_success]

    - name: card_management
      description: Physical and virtual cards — freeze, replace, PIN, limits, and contactless settings
      tags: [per_card]
      context:
        card: card
      regions:
        - name: card_visual
          description: Card image with masked number — tap to reveal full number temporarily
          events: [reveal_number]
          ambient:
            card: "data(card_management, .card)"
        - name: card_status
          description: Active, frozen, expired, or reported lost/stolen
          ambient:
            card: "data(card_management, .card)"
        - name: freeze_toggle
          description: Instant card freeze/unfreeze — blocks all new transactions
          events:
            toggle_freeze(boolean):
        - name: spending_limits
          description: Daily ATM, POS, and online transaction limits — adjustable
          events: [edit_limits, save_limits]
          ambient:
            card: "data(card_management, .card)"
          data:
            daily_atm_limit: number
            daily_pos_limit: number
            daily_online_limit: number
          state_machine:
            viewing:
              on:
                edit_limits: editing
            editing:
              on:
                save_limits: viewing
        - name: pin_change
          description: Change card PIN — requires current PIN or biometric
          events: [start_pin_change]
          data:
            current_pin: string
            new_pin: string
        - name: replacement_request
          description: Order replacement for damaged, lost, or stolen card
          tags: [active]
          events: [request_replacement]
        - name: contactless_settings
          description: Toggle contactless payments and set contactless transaction limit
          tags: [contactless_capable]
        - name: expired_notice
          description: Card expired — order renewal or activate replacement
          tags: [expired]
        - name: stolen_notice
          description: Card reported stolen — permanently blocked, replacement in progress
          tags: [stolen]
      state_machine:
        viewing:
          on:
            reveal_number: .
            toggle_freeze: .
            start_pin_change: .
            request_replacement: .

    - name: loan_application
      description: Multi-step loan application — eligibility, terms, documents, review, sign
      context:
        application: loan_application
      regions:
        - name: eligibility_check
          description: Pre-qualification based on income, credit score, and existing obligations
          events:
            check_eligibility(loan_application):
          data:
            annual_income: number
            employment_status: employment_status
        - name: not_eligible
          description: Declined with reason — credit score too low, debt-to-income too high
          tags: [not_eligible]
        - name: terms_selector
          description: Choose loan amount, duration, and repayment frequency — shows monthly payment
          tags: [eligible]
          events:
            select_terms(loan_application):
          data:
            loan_amount: number
            term_months: number
            repayment_frequency: repayment_frequency
        - name: document_upload
          description: Upload income proof, ID, and address verification
          events:
            upload_document(string):
            remove_document(string):
          data:
            uploaded_files: string[]
        - name: application_review
          description: Summary of application — personal info, terms, documents, and declarations
          tags: [overlay]
          events: [submit_application, edit_application]
          ambient:
            application: "data(loan_application, .application)"
        - name: digital_signature
          description: Legal agreement acceptance with biometric or OTP signature
          tags: [overlay]
          events: [sign_agreement, decline_agreement]
        - name: application_submitted
          description: Confirmation with application ID and expected decision timeline
          tags: [submitted]
        - name: approval_status
          description: Application under review / approved / rejected with next steps
          tags: [has_decision]
      state_machine:
        starting:
          regions: [eligibility_check]
          on:
            check_eligibility: checking
        terms:
          regions: [terms_selector]
          on:
            select_terms: documents
        documents:
          regions: [document_upload]
          on:
            upload_document: .
            remove_document: .
        reviewing:
          regions: [application_review]
          on:
            submit_application: signing
            edit_application: terms
        signing:
          regions: [application_review, digital_signature]
          on:
            sign_agreement: submitted
            decline_agreement: reviewing
        checking:
          regions: [eligibility_check]
        submitted:
          regions: [application_submitted]

    - name: pending_detail
      description: Pending action detail — unsigned loan, incomplete transfer, or expiring card
      tags: [per_pending]
      context:
        pending: pending_item
      regions:
        - name: pending_description
          description: What needs attention and why — with deadline if applicable
          ambient:
            pending: "data(pending_detail, .pending)"
        - name: action_button
          description: Resume, complete, or dismiss the pending item
          tags: [primary]
          events: [resume_action, dismiss_pending]
      state_machine:
        viewing:
          on:
            resume_action: .
            dismiss_pending: .

    - name: settings
      description: Security, notifications, and account preferences
      regions:
        - name: security_settings
          description: Change PIN, manage biometrics, two-factor, trusted devices
        - name: notification_preferences
          description: Push, SMS, email toggles per event type — transactions, login, marketing
        - name: privacy_settings
          description: Data sharing consent, account visibility, and statement preferences

  flows:
    - name: transfer_money
      description: End-to-end transfer from recipient selection to confirmation
      on: select_recipient
      sequence: "transfer{recipient} → amount_input{amount + source} → transfer_review → auth_challenge → transfer_success{reference}"

    - name: transfer_failed
      description: Transfer fails authentication or processing — retry or abandon
      sequence: "transfer_review → auth_challenge → auth_fail → transfer_review → retry or abandon"

    - name: freeze_card_from_alert
      description: Fraud alert triggers immediate card freeze from any screen
      on: block_card
      sequence: "fraud_alert → biometric_prompt → biometric_success → card_management{frozen}"

    - name: apply_for_loan
      description: Full loan application from eligibility through digital signature
      sequence: "loan_application → check_eligibility → terms_selector{terms} → document_upload{docs} → application_review → digital_signature → application_submitted{application ID}"

    - name: dispute_transaction
      description: Open a dispute on a settled transaction
      on: start_dispute
      sequence: "transaction_detail{transaction ref} → dispute form → submit → transaction_detail{disputed}"

    - name: session_expiry
      description: Inactivity triggers warning — extend session or get logged out
      sequence: "session_timeout activates → extend_session or logout → login"
