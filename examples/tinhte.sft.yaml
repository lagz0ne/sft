                  props: '{"items": ["Samsung Galaxy S22/S23/S24 duoc cap nhat One UI 8", "Robot cua Trung Quoc da thay doi the gioi", "Xiaomi gioi thieu san pham moi thang 4/2026", "Sony Xperia 1 VIII thiet ke moi", "Google Maps hien thi gioi han toc do tai VN"]}'
