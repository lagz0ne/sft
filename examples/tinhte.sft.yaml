                  props: '{"label": "+", "variant": "ghost"}'
                  delivery:
                    classes: [w-16, h-16, rounded-full, border-2, border-dashed, border-white/60, text-white, text-2xl]
                - name: create_fact_label
                  component: text
                  props: '{"content": "Tao fact", "level": 6}'
                  delivery:
                    classes: [text-white/80, "text-[10px]", font-medium, text-center]
            - name: fact_user_1
