          tags: [main]
          description: "3-column hero layout: spec sheet | hero article | quick view"
          delivery:
            classes: [grid, grid-cols-12, gap-4, my-4, max-w-6xl, mx-auto]
          regions:
            - name: product_spec_sheet
              description: "iPhone 17 spec sheet — left column"
              delivery:
                classes: [col-span-3, bg-white, rounded-xl, border, border-gray-100, shadow-sm]
              regions:
                - name: spec_product_image
                  component: image
                  props: '{"aspect": "4:3", "alt": "iPhone 17 render"}'
                  delivery:
                    classes: [w-full, rounded-lg, object-cover]
                - name: spec_product_name
                  component: text
                  props: '{"content": "iPhone 17 Pro Max", "level": 4}'
                  delivery:
                    classes: [text-sm, font-bold, text-gray-800]
                - name: spec_list
                  component: card
                  props: '{"items": ["Thiet ke uniform moi", "Dynamic Island nho hon", "Face ID an duoi man hinh", "CPU Apple A20 (2nm)", "Modem Apple C2", "Camera do khau do vat ly"]}'
                  delivery:
                    classes: [px-3, py-2.5, space-y-2, text-xs, text-gray-600]
                - name: spec_cta
                  component: button
                  props: '{"label": "Xem chi tiet", "variant": "ghost"}'
                  delivery:
                    classes: [w-full, text-center, text-xs, text-blue-600, font-medium, py-2, border-t, border-gray-100]

            - name: hero_article
