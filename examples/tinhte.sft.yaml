  screens:
    # ─── HOMEPAGE ────────────────────────────────────────────────────
    - name: homepage
      description: "Main feed — stories, hero zone, article stream, sidebar ads"
      context:
        facts: fact[]
        hero_article: article
        featured_articles: article[]
        top_articles: article[]
        feed_articles: article[]
        trending_tags: tag[]
        sidebar_articles: article[]
        ads: ad[]
        categories: category[]
      state_machine:
        browsing:
          fixture: homepage_full
          on:
            select_article: navigate(article_detail)
            select_fact: navigate(fact_viewer)
            select_category: navigate(category_page)
            search: navigate(search_results)

      regions:
        # --- Story carousel (banner) ---
        - name: tinhte_fact
          tags: [banner]
          description: "Story carousel — circular avatars with horizontal scroll"
          ambient:
            facts: "data(homepage, .facts)"
          delivery:
            classes: [bg-gradient-to-r, from-blue-500, via-blue-600, to-indigo-600, rounded-xl, px-4, py-4, my-4, max-w-6xl, mx-auto]
          regions:
            - name: create_fact_btn
              description: "Create new fact entry"
              regions:
