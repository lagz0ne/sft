  flows:
    - name: browse_and_read
      description: "User browses homepage, clicks article, reads it"
      steps: "homepage -> hero_article -> select_article -> article_detail -> comment_section"
    - name: story_viewing
      description: "User taps a story circle, views full-screen fact"
      steps: "homepage -> tinhte_fact -> select_fact -> fact_viewer -> fact_close -> [Back] -> homepage"
    - name: category_browse
      description: "User navigates to category from discovery pills"
      steps: "homepage -> category_nav -> select_category -> category_page -> category_feed"
    - name: search_flow
      description: "User searches from header"
      steps: "homepage -> search_bar -> search -> search_results -> results_list"
