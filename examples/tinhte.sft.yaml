      tags: [header]
      description: "Sticky top bar — logo, search, user actions"
      delivery:
        classes: [sticky, top-0, z-50, bg-white, border-b, border-gray-200, shadow-sm]
      regions:
        - name: logo
          component: text
          props: '{"content": "tinh te", "level": 1}'
          delivery:
            classes: [text-2xl, font-bold, text-blue-600, tracking-tight, cursor-pointer]
        - name: search_bar
          component: input
          props: '{"placeholder": "Tim san pham cong nghe, cong dong", "type": "search"}'
          delivery:
            classes: [flex-1, max-w-xl, h-10, rounded-full, bg-gray-100, border, border-gray-200, px-5, text-sm]
        - name: btn_notifications
          component: button
          props: '{"label": "Thong bao", "variant": "ghost"}'
          delivery:
            classes: [w-9, h-9, rounded-full, text-gray-500, hover:bg-gray-100]
        - name: btn_create
