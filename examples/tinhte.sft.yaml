app:
  name: tinhte
  description: "Tinhte.vn — Vietnamese tech community. Social Q&A, reviews, tech news."

  enums:
    article_category: [cong_nghe, di_dong, may_tinh, am_thanh, xe, nha_dat, lap_trinh, khoa_hoc, game, doi_song]
    fact_status: [active, expired]
    ad_format: [banner_300x250, banner_728x90, native_inline, sticky_sidebar]

  data:
    author:
      name: string
      avatar_url: string
      follower_count: number?
      post_count: number?
    article:
      title: string
      excerpt: string?
      thumbnail_url: string
      category: article_category
      author: author
      published_at: datetime
      comment_count: number
      is_sponsored: boolean
    fact:
      author: author
      image_url: string
      caption: string?
      status: fact_status
      created_at: datetime
    category:
      name: string
      slug: string
      icon: string?
      subscriber_count: number?
    tag:
      name: string
      slug: string
      icon: string?
    comment:
      author: author
      body: string
      created_at: datetime
      like_count: number
      replies: comment[]?
    ad:
      title: string
      image_url: string
      format: ad_format
      sponsor: string
      click_url: string

  context:
    current_user: author?

