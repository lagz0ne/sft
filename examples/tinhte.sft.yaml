                  component: image
                  props: '{"aspect": "1:1", "alt": "Cuong NB"}'
                  delivery:
                    classes: [w-16, h-16, rounded-full, object-cover, ring-3, ring-white/40]
                - name: fact_name_1
                  component: text
                  props: '{"content": "Cuong NB", "level": 6}'
                  delivery:
                    classes: [text-white/90, "text-[10px]", font-medium, text-center, w-16, truncate]
            - name: fact_user_2
              description: "Story avatar — luong binh"
              regions:
                - name: fact_avatar_2
                  component: image
                  props: '{"aspect": "1:1", "alt": "luong binh"}'
                  delivery:
                    classes: [w-16, h-16, rounded-full, object-cover, ring-3, ring-white/40]
                - name: fact_name_2
                  component: text
                  props: '{"content": "luong binh", "level": 6}'
                  delivery:
                    classes: [text-white/90, "text-[10px]", font-medium, text-center, w-16, truncate]
            - name: fact_user_3
