              regions:
                - name: fact_avatar_3
                  component: image
                  props: '{"aspect": "1:1", "alt": "thinervk"}'
                  delivery:
                    classes: [w-16, h-16, rounded-full, object-cover, ring-3, ring-white/40]
                - name: fact_name_3
