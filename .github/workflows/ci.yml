name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: oven-sh/setup-bun@v2
      - run: cd web && bun install --frozen-lockfile && bun run --filter 'web' build
      - run: go build ./...
      - run: go test ./...
      - run: go vet ./...
